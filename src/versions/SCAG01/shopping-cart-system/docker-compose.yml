version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: cart_user
      POSTGRES_PASSWORD: cart_password
      POSTGRES_DB: shopping_cart
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cart_user -d shopping_cart"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://cart_user:cart_password@db:5432/shopping_cart?schema=public
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push && npm start"

  frontend:
    build:
      context: ./frontend
    ports:
      - "5174:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:
