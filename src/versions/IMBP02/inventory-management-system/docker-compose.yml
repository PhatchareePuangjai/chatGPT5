version: "3.9"

services:
  backend:
    image: node:20
    container_name: imbp02_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    command: sh -c "npm install && npm start"

  frontend:
    image: node:20
    container_name: imbp02_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"
