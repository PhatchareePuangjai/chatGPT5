<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Shopping Cart</h1>
        <p class="sub">Minimal UI connected to the cart API.</p>
      </header>

      <section class="panel">
        <h2>Add Product + Cart Item</h2>
        <form id="add-form">
          <div class="grid">
            <label>
              SKU
              <input name="sku" required />
            </label>
            <label>
              Name
              <input name="name" required />
            </label>
            <label>
              Price (THB)
              <input name="price" type="number" step="0.01" required />
            </label>
            <label>
              Stock
              <input name="stock" type="number" min="1" required />
            </label>
            <label>
              Quantity
              <input name="quantity" type="number" min="1" required />
            </label>
          </div>
          <button type="submit">Add to Cart</button>
        </form>
        <p id="add-error" class="error"></p>
      </section>

      <section class="panel">
        <h2>Cart Items</h2>
        <div id="cart-items"></div>
        <div class="totals">
          <span>Total</span>
          <strong id="cart-total">0.00</strong>
        </div>
      </section>

      <section class="panel">
        <h2>Saved Items</h2>
        <div id="saved-items"></div>
      </section>
    </div>

    <script type="module" src="/src/main.js"></script>
    <link rel="stylesheet" href="/src/style.css" />
  </body>
</html>
