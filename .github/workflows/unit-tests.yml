name: Unit Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/versions/IMBP01/**'
      - 'src/versions/SCBP01/**'
      - 'src/versions/PDBP01/**'
      - 'src/versions/IMCE01/**'
      - 'src/versions/SCCE01/**'
      - 'src/versions/PDCE01/**'
      - 'src/versions/IMSD01/**'
      - 'src/versions/SCSD01/**'
      - 'src/versions/SCSD01_v2/**'
      - 'src/versions/PDSD01/**'
      - 'src/versions/IMAG01/**'
      - 'src/versions/PDAG01/**'
      - 'src/versions/SCAG01/**'
      - 'src/versions/IMBP02/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/versions/IMBP01/**'
      - 'src/versions/SCBP01/**'
      - 'src/versions/PDBP01/**'
      - 'src/versions/IMCE01/**'
      - 'src/versions/SCCE01/**'
      - 'src/versions/PDCE01/**'
      - 'src/versions/IMSD01/**'
      - 'src/versions/SCSD01/**'
      - 'src/versions/SCSD01_v2/**'
      - 'src/versions/PDSD01/**'
      - 'src/versions/IMAG01/**'
      - 'src/versions/PDAG01/**'
      - 'src/versions/SCAG01/**'
      - 'src/versions/IMBP02/**'
  workflow_dispatch:

jobs:
  # ─── Unit Tests ที่ใช้ PostgreSQL action (ไม่ต้อง docker compose) ────────────
  unit-test:
    name: Unit Test ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: IMBP01
            path: src/versions/IMBP01/online-shop-inventory/backend
            db_user: postgres
            db_pass: postgres
            db_name: shopdb
            database_url: postgresql://postgres:postgres@localhost:5432/shopdb
          - version: IMCE01
            path: src/versions/IMCE01/inventory-system/backend
            db_user: postgres
            db_pass: postgres
            db_name: inventory
            database_url: postgres://postgres:postgres@localhost:5432/inventory
          - version: IMSD01
            path: src/versions/IMSD01/backend
            db_user: inventory
            db_pass: inventory
            db_name: inventory
            database_url: postgresql://inventory:inventory@localhost:5432/inventory
          - version: PDCE01
            path: src/versions/PDCE01/promotions-discounts-system/backend
            db_user: ''
            db_pass: ''
            db_name: ''
            database_url: ''
          - version: IMBP02
            path: src/versions/IMBP02/backend
            db_user: ''
            db_pass: ''
            db_name: ''
            database_url: ''

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v2
        id: changes
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            src:
              - '${{ matrix.path }}/**'

      - name: Determine if should run
        id: should_run
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.changes.outputs.src }}" == "true" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Setup PostgreSQL
        if: steps.should_run.outputs.run == 'true' && matrix.db_name != ''
        uses: ikalnytskyi/action-setup-postgres@v5
        with:
          username: ${{ matrix.db_user }}
          password: ${{ matrix.db_pass }}
          database: ${{ matrix.db_name }}

      - name: Install Dependencies
        if: steps.should_run.outputs.run == 'true'
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run Database Migrations
        if: steps.should_run.outputs.run == 'true' && matrix.db_name != ''
        working-directory: ${{ matrix.path }}
        env:
          DATABASE_URL: ${{ matrix.database_url }}
        run: |
          if [ -f "scripts/run-migrations.js" ]; then
            npm run migrate || echo "Migration failed"
          elif [ -f "src/db/migrate.js" ]; then
            npm run db:migrate || echo "Migration failed"
          elif [ -f "db/migrate.js" ]; then
            npm run db:migrate || echo "Migration failed"
          else
            echo "No migration script found"
          fi

      - name: Run Tests
        if: steps.should_run.outputs.run == 'true'
        working-directory: ${{ matrix.path }}
        continue-on-error: true
        env:
          DATABASE_URL: ${{ matrix.database_url }}
          NODE_ENV: test
        run: npm test

  python-test:
    name: Python Test ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: SCSD01_v2
            path: src/versions/SCSD01_v2
            requirements: src/versions/SCSD01_v2/backend/requirements.txt

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v2
        id: changes
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            src:
              - '${{ matrix.path }}/**'

      - name: Determine if should run
        id: should_run
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.changes.outputs.src }}" == "true" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ${{ matrix.requirements }}

      - name: Install Dependencies
        if: steps.should_run.outputs.run == 'true'
        working-directory: ${{ matrix.path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest

      - name: Run Tests
        if: steps.should_run.outputs.run == 'true'
        working-directory: ${{ matrix.path }}
        env:
          PYTHONPATH: src
        run: python -m pytest tests/ -v

  # ─── Integration Tests (ใช้ Docker Compose สำหรับ database) ─────────────────
  integration-test:
    name: Integration Test ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # === AG versions — full docker compose + external test folder ===
          - version: IMAG01
            compose_path: src/versions/IMAG01
            test_path: src/versions/IMAG01/tests
            full_compose: true
            database_url: ''
            migrate_cmd: ''
            node_options: ''
          - version: PDAG01
            compose_path: src/versions/PDAG01
            test_path: src/versions/PDAG01/tests
            full_compose: true
            database_url: ''
            migrate_cmd: ''
            node_options: ''
          - version: SCAG01
            compose_path: src/versions/SCAG01/shopping-cart-system
            test_path: src/versions/SCAG01/tests
            full_compose: true
            database_url: ''
            migrate_cmd: ''
            node_options: ''

          # === BP / CE / SD versions — docker compose DB only + supertest ===
          - version: SCBP01
            compose_path: src/versions/SCBP01/shopping-cart-app
            test_path: src/versions/SCBP01/shopping-cart-app/backend
            full_compose: false
            database_url: postgresql://shop:shop@localhost:5433/shop
            migrate_cmd: 'npm run db:migrate && npm run db:seed'
            node_options: '--experimental-vm-modules'
          - version: PDBP01
            compose_path: src/versions/PDBP01/promo-shop-plug-and-play
            test_path: src/versions/PDBP01/promo-shop-plug-and-play/backend
            full_compose: false
            database_url: postgres://promo:promo@localhost:5435/promo_shop
            migrate_cmd: 'node -e "require(''./src/migrate'').migrateAndSeed().then(()=>process.exit(0))"'
            node_options: ''
          - version: SCCE01
            compose_path: src/versions/SCCE01/shopping-cart
            test_path: src/versions/SCCE01/shopping-cart/backend
            full_compose: false
            database_url: postgres://postgres:postgres@localhost:5433/shop
            migrate_cmd: ''
            node_options: ''
          - version: SCSD01
            compose_path: src/versions/SCSD01
            test_path: src/versions/SCSD01/tests
            full_compose: false
            database_url: postgres://postgres:postgres@localhost:5433/shopping_cart
            migrate_cmd: 'npm run db:migrate && npm run db:seed'
            node_options: ''
          - version: PDSD01
            compose_path: src/versions/PDSD01
            test_path: src/versions/PDSD01/backend
            full_compose: false
            database_url: postgres://promo:promo@localhost:5434/promotions
            migrate_cmd: 'npm run db:migrate && npm run db:seed'
            node_options: ''

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v2
        id: changes
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            src:
              - '${{ matrix.compose_path }}/**'
              - '${{ matrix.test_path }}/**'

      - name: Determine if should run
        id: should_run
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.changes.outputs.src }}" == "true" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      # Full docker compose สำหรับ AG (start ทุก service)
      - name: Start Full Application
        if: steps.should_run.outputs.run == 'true' && matrix.full_compose == true
        working-directory: ${{ matrix.compose_path }}
        run: |
          docker compose up -d --build
          echo "Waiting for application to initialize..."
          sleep 30

      # DB only สำหรับ BP/CE/SD (start เฉพาะ database)
      - name: Start Database Only
        if: steps.should_run.outputs.run == 'true' && matrix.full_compose == false
        working-directory: ${{ matrix.compose_path }}
        run: |
          docker compose up -d db --build
          echo "Waiting for database to be ready..."
          sleep 15

      - name: Setup Node.js
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Test Dependencies
        if: steps.should_run.outputs.run == 'true'
        working-directory: ${{ matrix.test_path }}
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Migrations
        if: steps.should_run.outputs.run == 'true' && matrix.migrate_cmd != ''
        working-directory: ${{ matrix.test_path }}
        env:
          DATABASE_URL: ${{ matrix.database_url }}
          NODE_ENV: test
        run: ${{ matrix.migrate_cmd }}

      # SCCE01 ใช้ env vars แยก (DB_HOST, DB_PORT) แทน DATABASE_URL
      - name: Set DB env for SCCE01
        if: steps.should_run.outputs.run == 'true' && matrix.version == 'SCCE01'
        run: |
          echo "DB_HOST=localhost" >> $GITHUB_ENV
          echo "DB_PORT=5433" >> $GITHUB_ENV
          echo "DB_USER=postgres" >> $GITHUB_ENV
          echo "DB_PASSWORD=postgres" >> $GITHUB_ENV
          echo "DB_NAME=shop" >> $GITHUB_ENV

      - name: Run Tests
        if: steps.should_run.outputs.run == 'true'
        working-directory: ${{ matrix.test_path }}
        continue-on-error: true
        env:
          DATABASE_URL: ${{ matrix.database_url }}
          NODE_ENV: test
          NODE_OPTIONS: ${{ matrix.node_options }}
        run: npm test

      - name: Stop Docker Compose
        if: always() && steps.should_run.outputs.run == 'true'
        working-directory: ${{ matrix.compose_path }}
        run: docker compose down
