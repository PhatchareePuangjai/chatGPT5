name: Unit Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/versions/IMBP01/**'
      - 'src/versions/SCBP01/**'
      - 'src/versions/PDBP01/**'
      - 'src/versions/IMBP02/**'
      - 'src/versions/SCBP02/**'
      - 'src/versions/PDBP02/**'
      - 'src/versions/IMBP03/**'
      - 'src/versions/SCBP03/**'
      - 'src/versions/PDBP03/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/versions/IMBP01/**'
      - 'src/versions/SCBP01/**'
      - 'src/versions/PDBP01/**'
      - 'src/versions/IMBP02/**'
      - 'src/versions/SCBP02/**'
      - 'src/versions/PDBP02/**'
      - 'src/versions/IMBP03/**'
      - 'src/versions/SCBP03/**'
      - 'src/versions/PDBP03/**'
  workflow_dispatch:

jobs:
  test:
    name: Test ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: IMBP01
            path: src/versions/IMBP01/online-shop-inventory/backend
          - version: SCBP01
            path: src/versions/SCBP01/shopping-cart-app/backend
          - version: PDBP01
            path: src/versions/PDBP01/promo-shop-plug-and-play/backend
          - version: IMBP02
            path: src/versions/IMBP02/inventory-system/backend
          - version: SCBP02
            path: src/versions/SCBP02/shopping-cart/backend
          - version: PDBP02
            path: src/versions/PDBP02/promotions-discounts-system/backend
          - version: IMBP03
            path: src/versions/IMBP03/backend
          - version: SCBP03
            path: src/versions/SCBP03/shopping-cart-app/backend
          - version: PDBP03
            path: src/versions/PDBP03/promotions-app/backend

    steps:
      - uses: actions/checkout@v4

      # ใช้ paths-filter เพื่อเช็คว่ามีการแก้ไขในโฟลเดอร์ของ version นั้นๆ หรือไม่
      # แต่ถ้าเป็น workflow_dispatch ให้รันทุก version
      - uses: dorny/paths-filter@v2
        id: changes
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            src:
              - '${{ matrix.path }}/**'

      # กำหนดว่าจะรันหรือไม่ (true ถ้าเป็น workflow_dispatch หรือมี changes)
      - name: Determine if should run
        id: should_run
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.changes.outputs.src }}" == "true" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      # Setup PostgreSQL สำหรับ version ที่ต้องการ database
      - name: Setup PostgreSQL
        if: steps.should_run.outputs.run == 'true' && (matrix.version == 'IMBP01' || matrix.version == 'IMBP02' || matrix.version == 'IMBP03')
        uses: ikalnytskyi/action-setup-postgres@v5
        with:
          username: ${{ matrix.version == 'IMBP03' && 'inventory' || 'postgres' }}
          password: ${{ matrix.version == 'IMBP03' && 'inventory' || 'postgres' }}
          database: ${{ matrix.version == 'IMBP03' && 'inventory' || (matrix.version == 'IMBP02' && 'inventory' || 'shopdb') }}

      - name: Check if package.json exists
        if: steps.should_run.outputs.run == 'true'
        id: check_package
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f "package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ package.json not found for ${{ matrix.version }}"
          fi

      - name: Install Dependencies
        if: steps.should_run.outputs.run == 'true' && steps.check_package.outputs.exists == 'true'
        working-directory: ${{ matrix.path }}
        run: npm ci

      # Run database migrations สำหรับ version ที่ต้องการ
      - name: Run Database Migrations
        if: steps.should_run.outputs.run == 'true' && steps.check_package.outputs.exists == 'true' && (matrix.version == 'IMBP01' || matrix.version == 'IMBP02' || matrix.version == 'IMBP03')
        working-directory: ${{ matrix.path }}
        env:
          DATABASE_URL: ${{ matrix.version == 'IMBP03' && 'postgresql://inventory:inventory@localhost:5432/inventory' || (matrix.version == 'IMBP02' && 'postgres://postgres:postgres@localhost:5432/inventory' || 'postgres://postgres:postgres@localhost:5432/shopdb') }}
        run: |
          if [ -f "scripts/run-migrations.js" ]; then
            npm run migrate || echo "⚠️ Migration script not found or failed"
          elif [ -f "db/migrate.js" ]; then
            npm run db:migrate || echo "⚠️ Migration script not found or failed"
          else
            echo "ℹ️ No migration script found for ${{ matrix.version }}"
          fi

      - name: Check if test script exists
        if: steps.should_run.outputs.run == 'true' && steps.check_package.outputs.exists == 'true'
        id: check_test
        working-directory: ${{ matrix.path }}
        run: |
          if grep -q '"test"' package.json; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ No test script found in package.json for ${{ matrix.version }}"
          fi

      - name: Run Tests
        if: steps.should_run.outputs.run == 'true' && steps.check_package.outputs.exists == 'true' && steps.check_test.outputs.exists == 'true'
        working-directory: ${{ matrix.path }}
        continue-on-error: true
        env:
          DATABASE_URL: ${{ matrix.version == 'IMBP03' && 'postgresql://inventory:inventory@localhost:5432/inventory' || (matrix.version == 'IMBP02' && 'postgres://postgres:postgres@localhost:5432/inventory' || (matrix.version == 'IMBP01' && 'postgres://postgres:postgres@localhost:5432/shopdb' || '')) }}
          NODE_ENV: test
        run: npm test
